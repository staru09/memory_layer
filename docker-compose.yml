services:
  postgres:
    image: postgres:16-alpine
    container_name: evermemos_postgres
    environment:
      POSTGRES_USER: evermemos
      POSTGRES_PASSWORD: evermemos
      POSTGRES_DB: evermemos
    ports:
      - "54345:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  qdrant:
    image: qdrant/qdrant:latest
    container_name: evermemos_qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  pgdata:
  qdrant_data:
